name: Spell Check

on:
  push:
    branches: [main, master]
    paths:
      - "posts/**/*.md"
  pull_request:
    branches: [main, master]
    paths:
      - "posts/**/*.md"

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run spell check
        run: bunx cspell "posts/**/*.md"
